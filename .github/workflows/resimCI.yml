name: CI ReSim

on:
  workflow_run:
    workflows: ["Trigger CI ReSim"]
    types:
      - completed

jobs:
  resim_checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Run ReSim
        run: |
          echo "LTX_PR_SERVER=${{ vars.LTX_PR_SERVER }}"
          echo "LTX_SCRIPT_LOCATION=${{ vars.LTX_SCRIPT_LOCATION }}"
          echo "LTX_TESTING_TOOLS=${{ vars.LTX_TESTING_TOOLS }}"

      - name: Get PR number from previous workflow run
        uses: actions/github-script@v8
        id: get_pr
        with:
          script: |
            const workflowRunId = context.payload.workflow_run.id;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            // Get workflow run details
            const run = await github.rest.actions.getWorkflowRun({
              owner,
              repo,
              run_id: workflowRunId
            });
            // Extract PR number from workflow_run.pull_requests
            const prNumber = run.data.pull_requests.length > 0 ? run.data.pull_requests[0].number : null;
            console.log("PR number:", prNumber);
            return prNumber;

      - name: Report status back to PR
        uses: actions/github-script@v8
        with:
          script: |
            const run = context.payload.workflow_run;
            const sha = run.head_sha;
            const conclusion = run.conclusion;
            let state;
            switch (conclusion) {
              case "success":
                state = "success";
                break;
              case "failure":
              case "timed_out":
              case "action_required":
                state = "failure";
                break;
              case "cancelled":
              case "skipped":
                state = "error";
                break;
              default:
                state = "error";
            }
            const prNumber = parseInt('${{ steps.get_pr.outputs.result }}') || null;
            const ltxServer = process.env.LTX_PR_SERVER;
            const targetUrl = prNumber ? `${ltxServer}/${prNumber}/` : ltxServer;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: sha,
              state: state,
              context: "CI / resim_checks",
              description: `ReSim finished with ${conclusion}`,
              target_url: targetUrl
            });
